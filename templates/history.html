<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Encrypt</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            min-height:100vh;
            background:#020617;
            padding:40px;
            color:white;
            overflow-x:hidden;
        }

        h1{
            text-align:center;
            margin-bottom:40px;
            font-size:40px;
        }

        .container{
            max-width:800px;
            margin:auto;
        }

        .card{
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.1);
            padding:25px;
            border-radius:20px;
            margin-bottom:20px;
            backdrop-filter:blur(20px);
        }

        .card h2{
            color:#00f5ff;
            margin-bottom:10px;
        }

        .buttons{
            margin-top:30px;
            display:flex;
            gap:15px;
            flex-wrap:wrap;
        }

        .back{
            display:inline-block;
            padding:14px 25px;
            border-radius:15px;
            text-decoration:none;
            color:white;
            background:linear-gradient(135deg,#00f5ff,#8b5cf6);
        }

        .clear{
            display:inline-block;
            padding:14px 25px;
            border-radius:15px;
            text-decoration:none;
            color:white;
            background:linear-gradient(135deg,#ff4d4d,#ff0066);
        }

    </style>

</head>
<body>

    <div class="container">

        <h1>Encryption History</h1>

        {% for item in history %}

            <div class="card">

                <h2>{{ item.asli }}</h2>

                <p>
                    {{ item.encrypt }}
                </p>

            </div>

        {% endfor %}

        <div class="buttons">

            <a href="/" class="back">
                Back
            </a>

            <a href="/clear-history" class="clear">
                Clear History
            </a>

        </div>

    </div>

</body>
</html>
