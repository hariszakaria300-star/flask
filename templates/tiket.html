<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-[#0a0a0a] text-white min-h-screen flex items-center justify-center p-6"
  >
    <!-- Card Tiket -->
    <div
      class="w-full max-w-sm bg-[#111] border border-zinc-800 p-8 rounded-[2rem] shadow-2xl text-center"
    >
      <h1
        class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-yellow-700 mb-6"
      >
        Pemesanan Berhasil!
      </h1>

      <!-- Data Ringkasan -->
      <div
        class="space-y-3 text-sm text-zinc-300 mb-8 text-left bg-[#1a1a1a] p-6 rounded-2xl border border-zinc-800"
      >
        <p class="flex justify-between">
          Nama: <span class="text-white font-semibold">{{ nama }}</span>
        </p>
        <p class="flex justify-between">
          Email: <span class="text-white font-semibold">{{ email }}</span>
        </p>
        <p class="flex justify-between">
          Jenis: <span class="text-white font-semibold">{{ jenis_tiket }}</span>
        </p>
        <p class="flex justify-between">
          Jumlah:
          <span class="text-white font-semibold">{{ jumlah }} tiket</span>
        </p>
        <div class="border-t border-zinc-700 pt-3 mt-3">
          <p class="flex justify-between text-lg font-bold">
            Total:
            <span class="text-yellow-500"
              >Rp {{ "{:,.0f}".format(total) }}</span
            >
          </p>
        </div>
      </div>

      <!-- QR Code -->
      <div class="bg-white p-4 rounded-3xl inline-block mb-6 shadow-lg">
        <img src="data:image/png;base64,{{ qr }}" class="w-40 h-40" />
      </div>

      <!-- Tombol Aksi -->
      <a
        href="data:image/png;base64,{{ qr }}"
        download="Tiket_{{ nama }}.png"
        class="block w-full py-4 mb-3 bg-gradient-to-r from-yellow-600 to-yellow-700 text-black font-bold rounded-2xl hover:scale-[1.02] transition-transform"
      >
        Download QR Code
      </a>

      <a
        href="/"
        class="block w-full py-4 border border-zinc-800 text-zinc-400 font-medium rounded-2xl hover:bg-zinc-800 transition"
      >
        Kembali ke Beranda
      </a>
    </div>
  </body>
</html>
