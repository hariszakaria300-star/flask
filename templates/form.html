<!doctype html>
<html lang="id">
  <head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body
    class="bg-[#0a0a0a] text-white flex items-center justify-center min-h-screen p-4"
  >
    <div
      class="w-full max-w-xl bg-[#111] border border-zinc-800 p-8 rounded-[2rem] shadow-2xl"
    >
      <h2
        class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-yellow-700 mb-2"
      >
        Art Exhibition 2026
      </h2>
      <p class="text-zinc-400 mb-6 text-sm">
        Tiket Digital Art Exhibition 2026 dengan Proteksi Enkripsi Fernet
      </p>

      <form action="/pesan" method="POST" class="space-y-4">
        <input
          type="text"
          name="nama"
          placeholder="Nama Lengkap"
          required
          class="w-full p-4 bg-[#1a1a1a] border border-zinc-800 rounded-xl outline-none focus:ring-1 focus:ring-yellow-600 transition-all"
        />

        <input
          type="email"
          name="email"
          placeholder="Email"
          required
          class="w-full p-4 bg-[#1a1a1a] border border-zinc-800 rounded-xl outline-none focus:ring-1 focus:ring-yellow-600 transition-all"
        />

        <select
          name="tanggal_kunjungan"
          required
          class="w-full p-4 bg-[#1a1a1a] border border-zinc-800 rounded-xl outline-none text-zinc-400 focus:ring-1 focus:ring-yellow-600"
        >
          <option value="" disabled selected>Pilih Tanggal Kunjungan</option>
          <option value="20-08-2026">20 Agustus 2026</option>
          <option value="21-08-2026">21 Agustus 2026</option>
        </select>

        <select
          name="jenis_tiket"
          required
          class="w-full p-4 bg-[#1a1a1a] border border-zinc-800 rounded-xl outline-none text-zinc-400 focus:ring-1 focus:ring-yellow-600">
          <option value="Regular">Regular - Rp 100.000</option>
          <option value="VIP">VIP - Rp 150.000</option>
        </select>

        <input
          type="number"
          name="jumlah"
          min="1"
          max="10"
          placeholder="Jumlah Tiket"
          required
          class="w-full p-4 bg-[#1a1a1a] border border-zinc-800 rounded-xl outline-none focus:ring-1 focus:ring-yellow-600"
        />

        <button
          type="submit"
          class="w-full py-4 bg-gradient-to-r from-yellow-600 to-yellow-700 rounded-xl font-bold text-lg text-black hover:scale-[1.01] transition-transform shadow-lg shadow-yellow-900/20"
        >
          Pesan Sekarang
        </button>
      </form>
    </div>
  </body>
</html>
